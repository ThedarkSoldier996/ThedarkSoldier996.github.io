<!DOCTYPE html>
<html>
<head>
  <title>Changelog</title>
  <meta charset="UTF-8">
</head>

<body style="background:#000;color:#fff;font-family:Arial;padding:20px">

<!-- BOTON DE DESCARGA -->
<a 
  href="https://raw.githubusercontent.com/ThedarkSoldier996/updater/main/app-release.apk"
  download
  style="
    display:inline-block;
    margin-bottom:20px;
    padding:15px 25px;
    background:#fff;
    color:#000;
    text-decoration:none;
    font-weight:bold;
    border-radius:10px;
    font-size:18px;
  "
>
⬇ DESCARGA DIRECTA
</a>

<h1>Changelog</h1>

<div id="changelog"></div>

<script>
fetch("https://raw.githubusercontent.com/ThedarkSoldier996/updater/main/update.json")
  .then(response => response.json())
  .then(data => {

    const container = document.getElementById("changelog");

    data.changelog.forEach(item => {

      const div = document.createElement("div");

      div.style.marginBottom = "10px";
      div.style.padding = "10px";
      div.style.border = "1px solid #444";
      div.style.borderRadius = "10px";

      div.textContent = item;

      container.appendChild(div);
    });

  });
</script>

</body>
</html>
